<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java script</title>
</head>
<style>
    * {
    margin: 10px;
    padding: 0;
    box-sizing: border-box;
}
    .heading{
        text-align: center;
        color: red;
    }
    .Theme{
        border: 2px solid black;
        height: 400px;
        width: auto;
        
    }
    .sm{
        border-radius: 50%;
        margin: 10px;
        float: right;
        background-color: white;
    }
    img{
        border-radius: 50%;
    }
    .bgmood{
        position: absolute;
        bottom: 50%;
        left: 30%;
    }
    /* finding the number catagory css */

    .container{
        height: 400px;
        border: 1px solid red;
        margin-top: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        
    }
    .card{
        border: 1px solid rgb(176, 176, 237);
        height: 200px;
        padding: 20px;
        
    }
    .card:hover{
         box-shadow: 5px 5px 10px blue;
    }
</style>
<body>
    <!-- work on theme changer -->
   <div > <h1 class="heading">Here all the thing is accur using java script</h1></div>
   <div class="Theme">
    <div class="sm" onclick="theme()"><img id="mainimg" src="image/moon.jpg" alt="symbol" height="100" width="100"></div>
    <div class="bgmood"><h1 class="bgco">This is light mood background theme</h1></div>
   </div>

   <!-- Finding the number catagory -->
    <div class="container">
        <div class="card">
            <p><b>Enter the  number and choose the option.</b></p>
            <input id="numbox" type="number">
            <select id="numberCatagory">
                <option value="Even_OR_Odd">Even OR Odd</option>
                <option value="Armstrong">Armstrong</option>
                <option value="Prime">Prime</option>
            </select>
            <button onclick="checkNum()">Check</button>
            <p class="result"></p>
        </div>
    </div>

</body>
<script src="index.js"></script>
</html>
