<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Header</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        header{
            position: sticky;
            top: 0;
            z-index: 1;
            background: grey;
            height: 15vh;
        }
        nav ul{
            display:flex;
            flex-wrap:wrap;
            align-items: center;
            justify-content:center;
            list-style:none;
        }

        nav ul li{
            margin:30px 40px 30px 30px;

        }

        nav ul li a{
            color:black;
            text-decoration:none;
            font-size:20px;
            font-weight: bold;
            
        }

        .dropdown{
            display:none;
            position:absolute;
            top:50px;
            left:15;
            background:#ef8080;
            list-style:none;
            min-width:150px;
        }

        .dropdown li a{
            padding:10px;
        }

        nav ul li:hover .dropdown{
            display:block;
           
        }
        .gallery{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:15px;
            padding:20px;
        }

        .gallery img{
            width:300px;
            height:200px;
            object-fit:cover;
            border-radius:8px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Image Type</a>
                    <ul class="dropdown">
                        <li><a href="#">Land scape</a></li>
                        <li><a href="#">Animals</a></li>
                        <li><a href="#">Forest</a></li>
                        <li><a href="#">Water fall</a></li>
                    </ul>
                </li>
                <li><a href="#">Gallery</a></li>
            </ul>
        </nav>
    </header>
    <section><section id="body">
        <div class="gallery">
            <img src="image/img1.jpg" alt="">
            <img src="image/img2.jpg" alt="">
            <img src="image/img3.jpg" alt="">
            <img src="image/img4.jpg" alt="">
            <img src="image/img5.jpg" alt="">
            <img src="image/img6.jpg" alt="">
            <img src="image/img7.jpg" alt="">
            <img src="image/img8.jpg" alt="">
            <img src="image/img9.jpg" alt="">
            <img src="image/img10.jpg" alt="">
            <img src="image/img11.jpg" alt=""> 
            <img src="image/img12.jpg" alt="">


        </div>
    </section></section>
</body>
</html>
