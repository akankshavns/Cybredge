<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Details</h1>
    <table border="1">
        <th>Name</th>
        <th>Rollno.</th>
        <th>Course</th>
        <tr>
            <td>Akanksha</td>
            <td>121</td>
            <td>MCA</td>
        </tr>
        <tr>
            <td>Mahi</td>
            <td>121</td>
            <td>BCom</td>
        </tr>
        <tr>
            <td>Ujala</td>
            <td>123</td>
            <td>BCA</td>
        </tr>
    </table>
    <h1>Using Colspan in table. </h1>
   <table border="1">
  <tr>
    <th colspan="2">Student Details</th>
  </tr>
  <tr>
    <td>Name</td>
    <td>Akanksha</td>
  </tr>
</table>
<h1>Using rowspan in table </h1>
<table border="1">
  <tr>
    <th rowspan="2">Subject</th>
    <td>Math</td>
  </tr>
  <tr>
    <td>Science</td>
  </tr>
</table>
</body>
</html>
