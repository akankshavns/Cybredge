<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Registration Form</h1>
    <Form>
        <span>Name</span>
        <input type="text" placeholder="Enter you name"><br>
        <span>Email</span>
        <input type="email" placeholder="Enter you email"><br>
        <span>Password</span>
         <input type="password" placeholder="Enter Passwoed"><br>
         <p>Gender</p>
        <input type="radio" name="gender" value="male"> Male
        <input type="radio" name="gender" value="female"> Female
        <p>Select your Hobby</p>
        <input type="checkbox" name="hobby" value="coding"> Coding
        <input type="checkbox" name="hobby" value="cooking"> Cooking
        <input type="checkbox" name="hobby" value="reading"> Reading
        <input type="checkbox" name="hobby" value="reading"> Other
        <br>
        <span>Course</span>
        <select>
            <option>BCA</option>
            <option>MCA</option>
            <option>B.Tech</option>
        </select><br>
        <span>Address</span><br>
        <textarea rows="4" cols="30"></textarea>
        <br><br>
        <input type="submit" >
    </Form>
</body>
</html>
