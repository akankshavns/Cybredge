<!DOCTYPE html>
<html>
<head>
    <title>Advanced Registration Form</title>
    <style>
        body{
            font-family: Arial;
            background:#f2f2f2;
        }
        .container{
            width:400px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }
        h2{
            text-align:center;
        }
        input,select{
            width:100%;
            padding:8px;
            margin-top:5px;
            margin-bottom:15px;
        }
        input[type=submit]{
            background:green;
            color:white;
            border:none;
            cursor:pointer;
        }
        input[type=submit]:hover{
            background:darkgreen;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Registration Form</h2>

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter your name" requiredmaxlength="30">

<label>Email</label>
<input type="email" placeholder="Enter your email" required>

<label>Password</label>
<input type="password" placeholder="Minimum 6 characters" pattern=".{6,}" required>

<label>Phone Number</label>
<input type="tel" placeholder="10 digit phone number" minlength="10" maxlength="10" pattern="[0-9]{10}"required>

<label>Date of Birth</label>
<input type="date" min="1990-01-01" max="2015-12-31" required>

<label>Age</label>
<input type="number" min="15" max="60" required>

<label>Upload Photo</label>
<input type="file"required>

<label>Favorite Color</label>
<input type="color">

<label>Skill Level</label>
<input type="range" min="1" max="10">

<label>Gender</label>
<select required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<input type="submit" value="Register">

</form>

</div>

</body>
</html>
